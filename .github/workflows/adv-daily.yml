name: ADV Daily Data Refresh

# Runs every day at 07:00 ET (12:00 UTC during EDT, 11:00 UTC during EST)
on:
  schedule:
    - cron: "0 12 * * *"   # 12:00 UTC = 07:00 ET (summer) / 07:00 ET (winter is 12:00 UTC)
  workflow_dispatch:        # Allow manual trigger from GitHub UI

permissions:
  contents: write           # Needed to commit the JSON back to the repo

jobs:
  export-adv-data:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests

      - name: Debug SEC API - find detail endpoints
        run: |
          echo "=== Test 1: firm detail by CRD (JSON) ==="
          curl -s -H "User-Agent: ISQ-InfraFundTracker support@bloorcapital.com" \
            -H "Accept: application/json" \
            "https://api.adviserinfo.sec.gov/search/firm/157465" | python3 -c "import sys,json; d=json.load(sys.stdin); print(json.dumps(d,indent=2)[:2000])" 2>&1 || echo "FAILED"
          echo ""
          echo "=== Test 2: firm summary endpoint ==="
          curl -s -H "User-Agent: ISQ-InfraFundTracker support@bloorcapital.com" \
            -H "Accept: application/json" \
            "https://adviserinfo.sec.gov/firm/summary/157465" | head -c 2000
          echo ""
          echo ""
          echo "=== Test 3: IAPD compilation page links ==="
          curl -s -H "User-Agent: ISQ-InfraFundTracker support@bloorcapital.com" \
            "https://adviserinfo.sec.gov/compilation" | head -c 3000
          echo ""
          echo ""
          echo "=== Test 4: SEC FOIA data page for download links ==="
          curl -s -H "User-Agent: ISQ-InfraFundTracker support@bloorcapital.com" \
            "https://www.sec.gov/data-research/sec-markets-data/information-about-registered-investment-advisers-exempt-reporting-advisers" | grep -ioE 'href="[^"]*\.(zip|csv)[^"]*"' | head -20
          echo ""
          echo "=== Test 5: SEC FOIA form-adv-data page ==="
          curl -s -H "User-Agent: ISQ-InfraFundTracker support@bloorcapital.com" \
            "https://www.sec.gov/foia-services/frequently-requested-documents/form-adv-data" | grep -ioE 'href="[^"]*\.(zip|csv)[^"]*"' | head -20
          echo ""
          echo "=== Test 6: reports.adviserinfo.sec.gov ==="
          curl -s -H "User-Agent: ISQ-InfraFundTracker support@bloorcapital.com" \
            "https://reports.adviserinfo.sec.gov/" | head -c 2000 2>&1 || echo "FAILED"

      - name: Run ADV export
        working-directory: adv_engine
        env:
          # SEC requires a User-Agent with contact info
          SEC_USER_AGENT: "ISQ-InfraFundTracker support@bloorcapital.com"
        run: |
          python export_static.py \
            --output ../ISQ_Tracker_Deploy/adv_leads.json

      - name: Check if data changed
        id: check_diff
        run: |
          git diff --quiet ISQ_Tracker_Deploy/adv_leads.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit updated data
        if: steps.check_diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ISQ_Tracker_Deploy/adv_leads.json
          git commit -m "chore: refresh ADV leads data $(date -u +%Y-%m-%d)"
          git push
